```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>The New Valdoria</title>

<style>

body{
background:radial-gradient(circle,#111,#000);
color:white;
font-family:Arial;
margin:0;
}

/* effet casino lumineux */

@keyframes glow{
0%{box-shadow:0 0 10px yellow;}
50%{box-shadow:0 0 25px yellow;}
100%{box-shadow:0 0 10px yellow;}
}

.card{
background:#111;
padding:20px;
margin:20px;
border-radius:10px;
animation:glow 2s infinite;
}

button{
background:linear-gradient(45deg,yellow,orange);
color:black;
border:none;
padding:12px 25px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
font-size:16px;
}

#wheelContainer{
text-align:center;
position:relative;
}

#pointer{
font-size:45px;
color:yellow;
text-shadow:0 0 10px yellow;
}

#wheel{
width:320px;
height:320px;
border-radius:50%;
border:8px solid yellow;
margin:auto;
position:relative;
overflow:hidden;
transition:transform 5s cubic-bezier(.17,.67,.12,.99);
box-shadow:0 0 30px yellow;
}

/* cases roue */

.slice{
position:absolute;
width:50%;
height:50%;
transform-origin:100% 100%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:16px;
color:white;
}

.slice span{
transform:skewY(60deg) rotate(30deg);
text-shadow:0 0 5px black;
}

/* résultat */

#result{
font-size:26px;
margin-top:15px;
font-weight:bold;
}

.win{
color:#00ff90;
text-shadow:0 0 15px #00ff90;
animation:glow 1s infinite;
}

.lose{
color:#ff4040;
}

</style>
</head>

<body>

<section class="card">

<h2>🎰 Roue Casino</h2>

<div id="wheelContainer">

<div id="pointer">▼</div>

<div id="wheel">

<div class="slice" style="background:#ff4040; transform:rotate(0deg) skewY(-60deg);"><span>PERDU</span></div>
<div class="slice" style="background:#00b34d; transform:rotate(60deg) skewY(-60deg);"><span>GAGNÉ</span></div>
<div class="slice" style="background:#ff4040; transform:rotate(120deg) skewY(-60deg);"><span>PERDU</span></div>
<div class="slice" style="background:#00b34d; transform:rotate(180deg) skewY(-60deg);"><span>GAGNÉ</span></div>
<div class="slice" style="background:#ff4040; transform:rotate(240deg) skewY(-60deg);"><span>PERDU</span></div>
<div class="slice" style="background:#ff4040; transform:rotate(300deg) skewY(-60deg);"><span>PERDU</span></div>

</div>

</div>

<br>

<button onclick="spin()">🎡 Tourner la roue</button>

<p id="result"></p>

</section>

<audio id="spinSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3">
</audio>

<script>

let rotation=0

function spin(){

let wheel=document.getElementById("wheel")
let resultText=document.getElementById("result")
let sound=document.getElementById("spinSound")

resultText.innerText=""

sound.currentTime=0
sound.play()

let random=Math.floor(Math.random()*360)

rotation+=1080+random

wheel.style.transform="rotate("+rotation+"deg)"

setTimeout(()=>{

let angle=rotation%360

let result="❌ PERDU"
let className="lose"

if(angle>60 && angle<120){
result="🎉 GAGNÉ !!!"
className="win"
}

if(angle>180 && angle<240){
result="🎉 GAGNÉ !!!"
className="win"
}

resultText.className=className
resultText.innerText=result

},5000)

}

</script>

</body>
</html>
